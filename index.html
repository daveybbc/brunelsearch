<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #F7F6F3;
  --text: #111111;
  --muted: #6b7280;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
}

```css
.container {
  max-width: 700px;
  width: 100%;
  padding: 40px 24px;
  text-align: center;
}

.logo {
  margin-bottom: 32px;
}

.logo img {
  width: 100%;
  max-width: 600px;
  height: auto;
  display: block;
  margin: 0 auto;
}

h1 {
  font-size: clamp(36px, 6vw, 64px);
  font-weight: 600;
  letter-spacing: -0.04em;
  margin: 0 0 16px;
}

p {
  font-size: 18px;
  line-height: 1.7;
  color: var(--muted);
  margin: 0 auto 32px;
  max-width: 600px;
}

@media (max-width: 768px) {
  .container {
    padding: 24px 20px;
  }

  .logo img {
    max-width: 320px;
  }

  p {
    font-size: 16px;
  }

  .btn {
    width: 100%;
    max-width: 280px;
  }
}
</style>
</head>

```html

    </div>

  </div>
</body>
</html>
